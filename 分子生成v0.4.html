<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MolDesigner - 小分子药物设计平台</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-secondary: #f1f5f9;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --primary-dark: #1d4ed8;
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --warning: #d97706;
            --warning-bg: #fef3c7;
            --error: #dc2626;
            --error-bg: #fef2f2;
            --info: #2563eb;
            --info-bg: #dbeafe;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08), 0 4px 8px rgba(0, 0, 0, 0.04);
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 64px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width var(--transition);
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            user-select: none;
        }
        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .brand-text,
        .sidebar.collapsed .sidebar-bottom-label,
        .sidebar.collapsed .nav-badge {
            display: none;
        }
        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 10px;
        }
        .sidebar.collapsed .sidebar-brand {
            justify-content: center;
            padding: 16px 8px;
        }
        .sidebar.collapsed .sidebar-bottom-item {
            justify-content: center;
            padding: 8px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            letter-spacing: -0.02em;
            transition: all var(--transition);
        }
        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .sidebar.collapsed .brand-icon {
            width: 28px;
            height: 28px;
            font-size: 0.85rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }
        .nav-section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: 8px 10px 4px;
            font-weight: 600;
        }
        .sidebar.collapsed .nav-section-label {
            display: none;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            white-space: nowrap;
            text-decoration: none;
        }
        .nav-item:hover {
            background: var(--surface-secondary);
            color: var(--text);
        }
        .nav-item.active {
            background: var(--primary-50);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }
        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .nav-item.active svg {
            opacity: 1;
        }
        .nav-badge {
            margin-left: auto;
            font-size: 0.7rem;
            background: var(--primary-100);
            color: var(--primary);
            padding: 2px 7px;
            border-radius: var(--radius-full);
            font-weight: 600;
        }

        .sidebar-bottom {
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-bottom-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .sidebar-bottom-item:hover {
            background: var(--surface-secondary);
            color: var(--text-secondary);
        }
        .sidebar-bottom-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 40;
            transition: all var(--transition);
            color: var(--text-muted);
            box-shadow: var(--shadow-sm);
        }
        .sidebar-toggle:hover {
            background: var(--surface-secondary);
            color: var(--text);
            box-shadow: var(--shadow);
        }
        .sidebar-toggle svg {
            width: 13px;
            height: 13px;
            transition: transform var(--transition);
        }
        .sidebar.collapsed .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
        }

        /* Top Bar */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            z-index: 20;
        }
        .top-bar h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .top-bar .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .breadcrumb span {
            cursor: pointer;
            transition: color 0.15s;
        }
        .breadcrumb span:hover {
            color: var(--primary);
        }
        .breadcrumb .sep {
            color: var(--border);
        }
        .breadcrumb .current {
            color: var(--text);
            font-weight: 600;
            cursor: default;
        }
        .breadcrumb .current:hover {
            color: var(--text);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: var(--shadow);
        }
        .card-no-border {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            border: none;
        }
        .card-no-border:hover {
            box-shadow: var(--shadow-md);
        }
        .card-header {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Module Card */
        .module-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: var(--shadow-sm);
            max-width: 500px;
        }
        .module-card:hover {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .module-card .module-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--primary-50);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--primary);
        }
        .module-card .module-icon svg {
            width: 22px;
            height: 22px;
        }
        .module-card .module-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }
        .module-card .module-info p {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* T-Layout */
        .t-layout {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }
        .t-layout-top {
            background: var(--primary-50);
            border: 1px solid var(--primary-200);
            border-radius: var(--radius);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
        }
        .t-layout-top .info-icon {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        .t-layout-bottom {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        .t-left {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .t-right {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 0;
        }
        .tab-btn {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            border: none;
            background: none;
            color: var(--text-muted);
            transition: all 0.15s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
            border-radius: var(--radius-xs) var(--radius-xs) 0 0;
        }
        .tab-btn:hover {
            color: var(--text);
            background: var(--surface-secondary);
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }
        .tab-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }
        .form-label {
            font-size: 0.84rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-label .required {
            color: var(--error);
            font-weight: 700;
        }
        .form-label .help-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--border);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            cursor: help;
            color: var(--text-muted);
            font-weight: 700;
            position: relative;
            transition: all 0.15s;
            font-style: italic;
        }
        .form-label .help-icon:hover {
            background: var(--primary-100);
            color: var(--primary);
        }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 0.88rem;
            font-family: var(--font-mono);
            transition: all 0.15s;
            background: var(--surface);
            color: var(--text);
            outline: none;
        }
        .form-input:focus {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px var(--primary-100);
        }
        .form-input::placeholder {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.82rem;
        }
        .input-with-icons {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-with-icons .form-input {
            padding-right: 80px;
        }
        .input-icons-right {
            position: absolute;
            right: 6px;
            display: flex;
            gap: 2px;
            align-items: center;
        }
        .input-icon-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.15s;
            font-size: 0.85rem;
        }
        .input-icon-btn:hover {
            background: var(--surface-secondary);
            color: var(--text);
        }
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 0.88rem;
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
            transition: all 0.15s;
            background: var(--surface);
            outline: none;
        }
        .form-textarea:focus {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px var(--primary-100);
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-xs);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-md);
        }
        .btn-outline {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: var(--surface-secondary);
            border-color: var(--text-muted);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78rem;
            border-radius: var(--radius-xs);
        }
        .btn-xs {
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 6px;
        }
        .btn-ghost {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: var(--radius-xs);
            font-size: 0.82rem;
            transition: all 0.15s;
        }
        .btn-ghost:hover {
            background: var(--surface-secondary);
            color: var(--text);
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-running {
            background: var(--info-bg);
            color: var(--info);
        }
        .status-completed {
            background: var(--success-bg);
            color: var(--success);
        }
        .status-failed {
            background: var(--error-bg);
            color: var(--error);
        }
        .status-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.6s infinite;
        }
        .status-running .status-dot {
            background: var(--info);
        }
        .status-completed .status-dot {
            background: var(--success);
            animation: none;
        }
        .status-pending .status-dot {
            background: var(--warning);
            animation: pulse 2s infinite;
        }
        .status-failed .status-dot {
            background: var(--error);
            animation: none;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* Job List */
        .job-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 500px;
            overflow-y: auto;
        }
        .job-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            background: var(--surface);
        }
        .job-item:hover {
            background: var(--surface-secondary);
            border-color: var(--border);
        }
        .job-item.selected {
            background: var(--primary-50);
            border-color: var(--primary-200);
        }
        .job-item .job-info {
            flex: 1;
            min-width: 0;
        }
        .job-item .job-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .job-item .job-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }
        .data-table th {
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .data-table th:hover {
            color: var(--primary);
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text);
            white-space: nowrap;
        }
        .data-table tbody tr {
            transition: all 0.1s;
            cursor: pointer;
        }
        .data-table tbody tr:hover {
            background: var(--primary-50);
        }
        .data-table tbody tr.selected-row {
            background: var(--primary-100);
            outline: 1px solid var(--primary-300);
            outline-offset: -1px;
        }
        .data-table .checkbox-cell {
            width: 36px;
            text-align: center;
        }

        /* Result Card */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .result-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-300);
        }
        .result-card .mol-structure {
            height: 100px;
            background: var(--surface-secondary);
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
        }
        .result-card .mol-structure svg {
            width: 100%;
            height: 100%;
        }
        .result-card .result-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .result-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: var(--radius-full);
            font-weight: 600;
            background: var(--primary-50);
            color: var(--primary);
        }
        .result-tag.good {
            background: var(--success-bg);
            color: var(--success);
        }
        .result-tag.warn {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        /* Tooltip */
        .tooltip-popup {
            position: absolute;
            background: #1e293b;
            color: #fff;
            padding: 10px 14px;
            border-radius: var(--radius-xs);
            font-size: 0.78rem;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
            max-width: 360px;
            white-space: normal;
            line-height: 1.5;
        }
        .tooltip-popup::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 20px;
            border: 6px solid transparent;
            border-bottom-color: #1e2938;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-width: 800px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 201;
            animation: slideUp 0.25s;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1rem;
        }
        .modal-body {
            padding: 20px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e293b;
            color: #fff;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            z-index: 300;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.success {
            border-left: 3px solid var(--success);
        }
        .toast.info {
            border-left: 3px solid var(--info);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Highlight */
        .highlight-box {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: var(--radius-xs);
            padding: 12px 16px;
            font-size: 0.82rem;
            color: #92400e;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        /* Collapsible */
        .collapsible-header {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.88rem;
            user-select: none;
            padding: 8px 0;
        }
        .collapsible-header svg {
            transition: transform 0.2s;
        }
        .collapsible-header.open svg {
            transform: rotate(90deg);
        }
        .collapsible-body {
            overflow: hidden;
            transition: max-height 0.3s;
        }

        /* Fullscreen */
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 250;
            display: flex;
            flex-direction: column;
        }
        .fullscreen-header {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Space vis */
        .chem-space-container {
            width: 100%;
            height: 300px;
            background: var(--surface-secondary);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .chem-space-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        .chem-space-dot:hover {
            transform: scale(1.6);
            z-index: 5;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
        }
        .chem-space-dot.selected-dot {
            border: 3px solid #000;
            z-index: 6;
            transform: scale(1.5);
        }

        /* Radar */
        .radar-container {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
        }
        .filter-select {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 0.82rem;
            background: var(--surface);
            cursor: pointer;
            outline: none;
        }
        .filter-select:focus {
            border-color: var(--primary-400);
        }
        .search-input {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            font-size: 0.82rem;
            outline: none;
            flex: 1;
            min-width: 160px;
        }
        .search-input:focus {
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        @media (max-width: 900px) {
            .t-layout-bottom {
                flex-direction: column;
            }
            .t-right {
                width: 100%;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>

        function generateMockMolecules(count, baseSmiles) {

            for (let i = 0; i < count; i++) {
                const frag = fragments[Math.floor(Math.random() * fragments.length)];
                const smi = baseSmiles.replace('*', frag);

                    id: `MOL-${String(i + 1).padStart(4, '0')}`,
                    smiles: smi,
                    dockingScore: -(Math.random() * 5 + 6).toFixed(1),

                    tpsa: Math.floor(Math.random() * 80 + 30),
                    rotBonds: Math.floor(Math.random() * 6 + 1),
                    ringCount: Math.floor(Math.random() * 3 + 1),
                });
            }
            return mols;

                    mc.innerHTML = renderDataView();

                    mc.innerHTML = renderModulesView();

            attachEventListeners();

                'workflows': 'workflows',
                'data': 'data',

            const target = navMap[state.currentView] || 'modules';

                state.selectedJobId = null;
                state.selectedResultJobId = null;

        // ==================== HELPERS ====================
        function getFilteredJobs() {
            let jobs = [...mockJobs];
            if (state.filters.status !== 'all') {
                jobs = jobs.filter(j => j.status === state.filters.status);
            }
            if (state.filters.search.trim()) {
                const s = state.filters.search.toLowerCase();
                jobs = jobs.filter(j => j.projectName.toLowerCase().includes(s) || j.id.toLowerCase().includes(s));
            }
            if (state.sortField) {
                jobs.sort((a, b) => {
                    let va = a[state.sortField] || '';
                    let vb = b[state.sortField] || '';
                    if (typeof va === 'number') return state.sortDir === 'asc' ? va - vb : vb - va;
                    return state.sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(
                        String(va));
                });
            }
            return jobs;
        }

        function sortJobs(field) {
            if (state.sortField === field) {
                state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                state.sortField = field;
                state.sortDir = 'asc';
            }
            render();
        }

        function sortMolecules(criteria) {
            showToast(`按 ${criteria} 排序（模拟）`, 'info');

            state.selectedJobId = jobId;

            state.chemSpaceSelectedIndex = null;
            render();
            document.getElementById('main-content').scrollTop = 0;
        }

        function openMoleculeDetail(molId, index) {
            state.chemSpaceSelectedIndex = index;
            showToast(`选中分子: ${molId}`, 'info');
            // Highlight in chem space
            setTimeout(() => {
                const dots = document.querySelectorAll('.chem-space-dot');
                dots.forEach(d => d.classList.remove('selected-dot'));
                if (dots[index]) dots[index].classList.add('selected-dot');
                // Update radar
                const job = mockJobs.find(j => j.id === state.selectedJobId);
                if (job) {
                    const mols = generateMockMolecules(job.moleculeCount || 30, job.smiles);
                    const radarContainer = document.getElementById('radar-chart');
                    if (radarContainer && mols[index]) {
                        radarContainer.innerHTML = renderRadarChart(mols[index]);
                    }
                }
            }, 100);
        }

        function viewProjectJobs(projectId) {
            const project = mockProjects.find(p => p.id === projectId);
            if (project && mockJobs.length > 0) {
                const relatedJob = mockJobs.find(j => j.projectName.includes(project.name.split('优化')[0]) || j
                    .projectName.includes(project.name.split('筛选')[0]) || j.projectName.includes(project.name.split(
                        '替换')[0]));
                if (relatedJob) {
                    openJobDetail(relatedJob.id);
                } else {
                    openJobDetail(mockJobs[0].id);
                }
            }
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('#project-tabs .tab-btn').forEach(b => b.classList.remove('active'));
            const tabBtn = document.querySelector(`#project-tabs .tab-btn[data-tab="${tab}"]`);
            if (tabBtn) tabBtn.classList.add('active');
            document.getElementById('tab-content-r-group').style.display = tab === 'r-group' ? 'block' : 'none';
            document.getElementById('tab-content-scaffold').style.display = tab === 'scaffold' ? 'block' : 'none';
            document.getElementById('tab-content-denovo').style.display = tab === 'denovo' ? 'block' : 'none';
        }

        function handleSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('project-name')?.value || '未命名项目';
            const smiles = document.getElementById('smiles-input')?.value || '*c1cnc2ccccc2c1';
            const count = parseInt(document.getElementById('mol-count')?.value || '100');
            const newJob = {
                id: `JOB-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${String(mockJobs.length+1).padStart(3,'0')}`,
                projectName: name,
                status: 'running',
                createdAt: new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-'),
                completedAt: '-',
                duration: '进行中...',
                moleculeCount: 0,
                smiles: smiles,
                dockingScore: null,
                qed: null,
                logP: null,
                mw: null,
            };
            mockJobs.unshift(newJob);
            state.selectedJobId = newJob.id;
            showToast('任务已提交，正在运行中...', 'info');
            // Simulate completion after delay
            setTimeout(() => {
                newJob.status = 'completed';
                newJob.completedAt = new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-');
                newJob.duration = Math.floor(Math.random() * 25 + 5) + 'min';
                newJob.moleculeCount = count;
                newJob.dockingScore = -(Math.random() * 5 + 6).toFixed(1);
                newJob.qed = (Math.random() * 0.5 + 0.4).toFixed(2);
                newJob.logP = (Math.random() * 4 + 0.5).toFixed(1);
                newJob.mw = Math.floor(Math.random() * 200 + 300);
                if (state.currentView === 'function' || state.currentView === 'job-detail' || state.currentView ===
                    'jobs') {
                    render();
                }
                updateJobBadge();
                showToast(`任务 ${newJob.id} 已完成！`, 'success');
            }, 8000 + Math.random() * 4000);
            state.currentView = 'function';
            render();
            document.getElementById('main-content').scrollTop = 0;
            updateJobBadge();
        }

        function resetForm() {
            const form = document.getElementById('project-form');
            if (form) form.reset();
            const smilesInput = document.getElementById('smiles-input');
            if (smilesInput) smilesInput.value = '*c1cnc2ccccc2c1';
            showToast('表单已重置', 'info');
        }

        function highlightJobItem(el) {
            if (state.selectedJobId && el.dataset.jobId === state.selectedJobId) return;
            el.style.background = 'var(--surface-secondary)';
            el.style.borderColor = 'var(--border)';
        }

        function unhighlightJobItem(el) {
            if (state.selectedJobId && el.dataset.jobId === state.selectedJobId) return;
            el.style.background = '';
            el.style.borderColor = 'transparent';
        }

        function batchSelectToggle() {
            showToast('批量选择模式切换（模拟）', 'info');
        }

        function toggleSelectAll(checkbox) {
            showToast(checkbox.checked ? '已全选' : '已取消全选', 'info');
        }

        function toggleJobSelect(jobId, checkbox) {
            if (checkbox.checked) state.selectedMoleculeIds.add(jobId);
            else state.selectedMoleculeIds.delete(jobId);
        }

        function openFullscreen() {
            const container = document.getElementById('fullscreen-container');
            if (!container) return;
            const job = mockJobs.find(j => j.id === state.selectedJobId);
            if (!job) return;
            const mols = generateMockMolecules(job.moleculeCount || 30, job.smiles);
            container.innerHTML = `
            <div class="fullscreen-overlay">
                <div class="fullscreen-header">
                    <span style="font-weight:700;">全屏查看 - ${job.projectName}</span>
                    <button class="btn btn-outline btn-sm" onclick="closeFullscreen()">✕ 退出全屏</button>
                </div>
                <div style="flex:1;overflow-y:auto;padding:20px;">
                    <div class="result-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));">
                        ${mols.slice(0,40).map(m=>`
                        <div class="result-card">
                            <div class="mol-structure">${renderMoleculeSVG(m.smiles)}</div>
                            <div style="font-size:0.78rem;font-weight:600;">${m.id}</div>
                            <div class="result-tags">
                                <span class="result-tag">对接:${m.dockingScore}</span>
                                <span class="result-tag">QED:${m.qed}</span>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>
            </div>`;
        }

        function closeFullscreen() {
            const container = document.getElementById('fullscreen-container');
            if (container) container.innerHTML = '';
        }

        function generateChemSpaceDots(mols) {
            return mols.map((m, i) => {
                const x = (parseFloat(m.logP) / 5) * 90 + 3;
                const y = (parseFloat(m.qed)) * 85 + 5;
                const score = parseFloat(m.dockingScore);
                const color = score < -9 ? '#2563eb' : score < -7 ? '#f59e0b' : '#ef4444';
                const isSelected = state.chemSpaceSelectedIndex === i;
                return `<div class="chem-space-dot${isSelected?' selected-dot':''}"
                    style="left:${x}%;top:${y}%;background:${color};"
                    title="${m.id}: Docking=${m.dockingScore}, QED=${m.qed}"
                    onclick="event.stopPropagation();state.chemSpaceSelectedIndex=${i};render();">
                </div>`;
            }).join('');
        }

        function renderRadarChart(mol) {
            if (!mol) mol = { dockingScore: -8, qed: 0.7, logP: 2, mw: 380, hbd: 2, hba: 4, tpsa: 60 };
            const labels = ['对接分数', 'QED', 'LogP', 'MW', 'HBD', 'HBA'];
            const rawValues = [
                Math.abs(parseFloat(mol.dockingScore || 8)) / 12,
                parseFloat(mol.qed || 0.7),
                parseFloat(mol.logP || 2) / 5,
                (mol.mw || 380) / 500,
                (mol.hbd || 2) / 5,
                (mol.hba || 4) / 8,
            ];
            const values = rawValues.map(v => Math.min(1, Math.max(0, v)));
            const cx = 140,
                cy = 140,
                r = 100;
            const n = labels.length;
            const points = values.map((v, i) => {
                const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
                return { x: cx + r * v * Math.cos(angle), y: cy + r * v * Math.sin(angle) };
            });
            const gridPoints5 = labels.map((_, i) => {
                const a = (Math.PI * 2 * i) / n - Math.PI / 2;
                return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
            });
            const gridPoints3 = labels.map((_, i) => {
                const a = (Math.PI * 2 * i) / n - Math.PI / 2;
                return { x: cx + r * 0.6 * Math.cos(a), y: cy + r * 0.6 * Math.sin(a) };
            });
            const polygonPoints = points.map(p => `${p.x},${p.y}`).join(' ');
            const grid5 = gridPoints5.map(p => `${p.x},${p.y}`).join(' ');
            const grid3 = gridPoints3.map(p => `${p.x},${p.y}`).join(' ');
            return `
            <svg viewBox="0 0 280 280" style="width:100%;">
                <polygon points="${grid5}" fill="none" stroke="#e2e8f0" stroke-width="1"/>
                <polygon points="${grid3}" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
                ${labels.map((l,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2;const tx=cx+(r+22)*Math.cos(a);const ty=cy+(r+22)*Math.sin(a);return`<text x="${tx}" y="${ty}" text-anchor="middle" font-size="9" fill="#64748b">${l}</text>`;}).join('')}
                <polygon points="${polygonPoints}" fill="rgba(37,99,235,0.25)" stroke="#2563eb" stroke-width="2"/>
                ${points.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#2563eb"/>`).join('')}
            </svg>`;
        }

        function renderMoleculeSVG(smiles) {
            // Simple simulated 2D structure rendering
            const hash = smiles.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
            const rings = (hash % 3) + 1;
            const branches = (hash % 4) + 1;
            let svgContent = '';
            const colors = ['#2563eb', '#3b82f6', '#60a5fa', '#1d4ed8', '#64748b'];
            // Draw simulated rings
            for (let r = 0; r < rings; r++) {
                const cx = 30 + r * 35;
                const cy = 40 + (r % 2) * 20;
                const rr = 14 + (hash % 8);
                svgContent +=
                    `<polygon points="${cx-rr},${cy} ${cx-rr*0.5},${cy-rr*0.866} ${cx+rr*0.5},${cy-rr*0.866} ${cx+rr},${cy} ${cx+rr*0.5},${cy+rr*0.866} ${cx-rr*0.5},${cy+rr*0.866}" fill="none" stroke="${colors[r%colors.length]}" stroke-width="2.5" opacity="0.8"/>`;
            }
            // Draw simulated bonds
            for (let b = 0; b < branches; b++) {
                const x1 = 25 + b * 30;
                const y1 = 25 + (b % 3) * 25;
                const x2 = x1 + 20;
                const y2 = y1 - 15 + (b % 2) * 20;
                svgContent +=
                    `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${colors[b%colors.length]}" stroke-width="2" opacity="0.7"/>`;
            }
            // Labels
            svgContent +=
                `<text x="50" y="85" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="monospace">${smiles.slice(0,18)}...</text>`;
            return `<svg viewBox="0 0 100 100" style="width:100%;height:100%;">${svgContent}</svg>`;
        }

        // ==================== TOOLTIP ====================
        function showTooltip(event, text) {
            const tooltip = document.getElementById('global-tooltip');
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            const rect = event.target.getBoundingClientRect();
            tooltip.style.left = rect.left + 'px';
            tooltip.style.top = (rect.bottom + 8) + 'px';
            tooltip.style.maxWidth = '360px';
        }

        function hideTooltip() {
            document.getElementById('global-tooltip').style.display = 'none';
        }

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ==================== EVENT LISTENERS ====================
        function attachEventListeners() {
            // Global click to close tooltip
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.help-icon')) {
                    hideTooltip();
                }
            });
            // Close fullscreen on Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeFullscreen();
                }
            });
        }

        // ==================== INIT ====================
        function init() {
            render();
            attachEventListeners();
            // Set initial filter values in jobs view
            setTimeout(() => {
                const statusFilter = document.getElementById('status-filter');
                if (statusFilter) statusFilter.value = state.filters.status;
                const searchInput = document.getElementById('job-search');
                if (searchInput) searchInput.value = state.filters.search;
            }, 100);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
