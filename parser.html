<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HTML 沙盒 · 即时预览 + GitHub 版本控制</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免拖拽时选中文字 */
        }

        /* 主题变量（深色默认） */
        :root {
            --bg-body: #0d1117;
            --bg-header: #010409;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --bg-editor: #0d1117;
            --bg-sidebar: #161b22;
            --bg-modal: #161b22;
            --bg-input: #0d1117;
            --bg-card: rgba(25, 35, 55, 0.7);
            --shadow: rgba(0,0,0,0.3);
            --btn-primary: #238636;
            --btn-secondary: #1f6feb;
            --btn-danger: #6e2e2e;
            --preview-bg: white;
            --preview-text: black;
        }

        body.light {
            --bg-body: #f6f8fa;
            --bg-header: #ffffff;
            --border-color: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --bg-editor: #ffffff;
            --bg-sidebar: #f6f8fa;
            --bg-modal: #ffffff;
            --bg-input: #ffffff;
            --bg-card: rgba(255,255,255,0.9);
            --shadow: rgba(0,0,0,0.1);
            --btn-primary: #2c974b;
            --btn-secondary: #0969da;
            --btn-danger: #cf222e;
            --preview-bg: white;
            --preview-text: black;
        }

        body {
            margin: 0;
            background: var(--bg-body);
            font-family: 'Segoe UI', 'Roboto', 'Fira Code', monospace, system-ui;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* 顶部栏 */
        .header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }
        .title h1 {
            font-size: 1.35rem;
            margin: 0;
            font-weight: 600;
            background: linear-gradient(135deg, #79c0ff, #b392f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p {
            font-size: 0.7rem;
            margin: 0;
            color: var(--text-secondary);
        }
        .right-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-msg {
            font-family: monospace;
            font-size: 0.75rem;
            background: var(--bg-sidebar);
            padding: 0.2rem 0.8rem;
            border-radius: 16px;
            color: #7ee787;
        }
        body.light .status-msg {
            color: #1a7f37;
        }
        .icon-btn {
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .icon-btn:hover {
            background: var(--border-color);
        }
        .theme-btn {
            font-size: 1rem;
            padding: 0.3rem 0.6rem;
        }

        /* 主工作区 - 可拖拽布局 */
        .main-panel {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* 编辑器容器 */
        .editor-container {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
            min-width: 200px;
            overflow: hidden;
        }
        /* 预览容器 */
        .preview-container {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: var(--preview-bg);
            overflow: hidden;
            position: relative;
        }
        /* 拖拽分隔条 */
        .resizer {
            width: 6px;
            background: var(--border-color);
            cursor: ew-resize;
            transition: background 0.1s;
            position: relative;
            z-index: 10;
        }
        .resizer:hover {
            background: #58a6ff;
        }

        .area-header {
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-btn {
            background: var(--btn-danger);
            border: none;
            border-radius: 6px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
        }
        .code-container {
            flex: 1;
            padding: 12px;
            background: var(--bg-editor);
        }
        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        textarea:focus {
            border-color: #58a6ff;
        }

        .iframe-wrapper {
            flex: 1;
            background: var(--preview-bg);
            position: relative;
            margin: 8px 12px 12px 12px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--preview-bg);
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
        }
        .open-new-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
        }
        .open-new-btn:hover {
            background: var(--border-color);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: var(--bg-modal);
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 35px var(--shadow);
        }
        .modal-card h3 {
            margin-bottom: 1.2rem;
        }
        .modal-card .field {
            margin-bottom: 1rem;
        }
        .modal-card label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1.2rem;
        }
        .modal-actions button {
            padding: 0.4rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .modal-actions button.load {
            background: var(--btn-secondary);
            color: white;
        }
        .modal-actions button.save {
            background: var(--btn-primary);
            color: white;
        }
        .modal-actions button.cancel {
            background: var(--bg-sidebar);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">
        <h1>📄 HTML 沙盒 · 即时预览 + GitHub 版本控制</h1>
        <p>粘贴代码 | 实时渲染 | 保存到仓库（带描述）</p>
    </div>
    <div class="right-area">
        <div class="status-msg" id="statusMsg">✅ 就绪</div>
        <button class="icon-btn theme-btn" id="themeToggleBtn">主题</button>
        <button class="icon-btn" id="settingsBtn">上传</button>
    </div>
</div>

<div class="main-panel" id="mainPanel">
    <div class="editor-container" id="editorContainer">
        <div class="area-header">
            <span>✏️ HTML 代码编辑器</span>
            <button class="clear-btn" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="code-container">
            <textarea id="htmlCode" spellcheck="false" placeholder="<!-- 粘贴或编写 HTML 代码 -->"></textarea>
        </div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="preview-container" id="previewContainer">
        <div class="preview-header">
            <span>🔍 实时预览</span>
            <button class="open-new-btn" id="openNewTabBtn">🔗 新标签打开</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="previewFrame" title="live preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>

<!-- 设置弹窗（集成保存/加载） -->
<div id="settingsModal" class="modal">
    <div class="modal-card">
        <h3>⚙️ GitHub 配置与操作</h3>
        <div class="field">
            <label>🔑 GitHub Token (repo 权限)</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxx 或 github_pat_xxxx">
        </div>
        <div class="field">
            <label>👤 仓库所有者</label>
            <input type="text" id="repoOwner" placeholder="用户名/组织" value="A1ando">
        </div>
        <div class="field">
            <label>📁 仓库名称</label>
            <input type="text" id="repoName" placeholder="repo-name" value="design">
        </div>
        <div class="field">
            <label>📂 文件路径</label>
            <input type="text" id="filePath">
        </div>
        <div class="field">
            <label>✍️ 提交描述</label>
            <textarea id="commitMessage" rows="2" placeholder="更新 HTML 内容"></textarea>
        </div>
        <div class="modal-actions">
            <button class="cancel" id="cancelModalBtn">取消</button>
            <button class="save" id="saveAndUploadBtn">保存并上传</button>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const htmlCodeArea = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const statusDiv = document.getElementById('statusMsg');
    const settingsBtn = document.getElementById('settingsBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modal = document.getElementById('settingsModal');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const loadFromGitBtn = document.getElementById('loadFromGitBtn');
    const saveAndUploadBtn = document.getElementById('saveAndUploadBtn');
    const openNewTabBtn = document.getElementById('openNewTabBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    
    // 弹窗内的输入框
    const tokenInput = document.getElementById('githubToken');
    const ownerInput = document.getElementById('repoOwner');
    const repoNameInput = document.getElementById('repoName');
    const filePathInput = document.getElementById('filePath');
    const commitMsgTextarea = document.getElementById('commitMessage');

    // 存储当前配置
    let currentConfig = {
        token: '',
        owner: 'A1ando',
        repo: 'design',
        filePath: '',
        commitMessage: ''
    };

    // ---------- 主题切换 ----------
    function initTheme() {
        const savedTheme = localStorage.getItem('preview_theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light');
        } else {
            document.body.classList.remove('light');
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('light')) {
            document.body.classList.remove('light');
            localStorage.setItem('preview_theme', 'dark');
        } else {
            document.body.classList.add('light');
            localStorage.setItem('preview_theme', 'light');
        }
    }
    themeToggleBtn.addEventListener('click', toggleTheme);

    // ---------- 拖拽调整比例 ----------
    const editorContainer = document.getElementById('editorContainer');
    const previewContainer = document.getElementById('previewContainer');
    const resizer = document.getElementById('resizer');
    let startX, startEditorWidth, startPreviewWidth;
    function onMouseMove(e) {
        const containerRect = document.getElementById('mainPanel').getBoundingClientRect();
        const newEditorWidth = e.clientX - containerRect.left - (resizer.offsetWidth / 2);
        if (newEditorWidth > 150 && newEditorWidth < containerRect.width - 150) {
            editorContainer.style.width = newEditorWidth + 'px';
            previewContainer.style.width = (containerRect.width - newEditorWidth - resizer.offsetWidth) + 'px';
        }
    }
    function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        // 保存比例
        const mainRect = document.getElementById('mainPanel').getBoundingClientRect();
        const editorWidth = editorContainer.offsetWidth;
        const ratio = editorWidth / mainRect.width;
        localStorage.setItem('editor_ratio', ratio);
    }
    function initResizer() {
        const savedRatio = localStorage.getItem('editor_ratio');
        if (savedRatio) {
            const mainRect = document.getElementById('mainPanel').getBoundingClientRect();
            const newEditorWidth = mainRect.width * parseFloat(savedRatio);
            if (newEditorWidth > 150 && newEditorWidth < mainRect.width - 150) {
                editorContainer.style.width = newEditorWidth + 'px';
                previewContainer.style.width = (mainRect.width - newEditorWidth - resizer.offsetWidth) + 'px';
            }
        }
        resizer.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            startEditorWidth = editorContainer.offsetWidth;
            startPreviewWidth = previewContainer.offsetWidth;
            document.body.style.cursor = 'ew-resize';
            document.body.style.userSelect = 'none';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            e.preventDefault();
        });
    }

    // ---------- 辅助函数 ----------
    function showStatus(msg, isError = false) {
        statusDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        statusDiv.style.color = isError ? '#f85149' : '#7ee787';
        setTimeout(() => {
            if (statusDiv.innerHTML === `✅ ${msg}` || statusDiv.innerHTML === `❌ ${msg}`) {
                statusDiv.style.color = '#b1bac4';
                statusDiv.innerHTML = '✅ 就绪';
            }
        }, 4000);
    }

    // 确保文件路径以 .html 结尾
    function normalizeFilePath(path) {
        let trimmed = path.trim();
        if (!trimmed) return '';
        if (!trimmed.toLowerCase().endsWith('.html')) {
            return trimmed + '.html';
        }
        return trimmed;
    }

    // base64 编码
    function utf8ToBase64(str) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(str);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    function base64ToUtf8(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
    }

    async function getExistingFileSha(owner, repo, path, token) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });
        if (response.status === 200) {
            const data = await response.json();
            return data.sha;
        } else if (response.status === 404) {
            return null;
        } else {
            throw new Error(`获取文件信息失败 (${response.status})`);
        }
    }

    async function saveToGitHub(owner, repo, path, content, commitMessage, token) {
        const sha = await getExistingFileSha(owner, repo, path, token);
        const encodedContent = utf8ToBase64(content);
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const payload = {
            message: commitMessage,
            content: encodedContent,
            branch: undefined
        };
        if (sha) payload.sha = sha;
        const response = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            const errData = await response.text();
            throw new Error(`保存失败 ${response.status}: ${errData.slice(0, 150)}`);
        }
        return await response.json();
    }

    async function loadFromGitHub(owner, repo, path, token) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });
        if (response.status === 404) {
            throw new Error(`文件 "${path}" 不存在`);
        }
        if (!response.ok) {
            throw new Error(`加载失败 (${response.status})`);
        }
        const data = await response.json();
        if (data.encoding !== 'base64') throw new Error('文件编码不是 base64');
        return base64ToUtf8(data.content);
    }

    function updatePreview() {
        const code = htmlCodeArea.value;
        const iframe = previewFrame;
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        } catch (err) {
            iframe.srcdoc = code;
        }
    }

    function clearEditor() {
        if (confirm('确定要清空所有代码吗？')) {
            htmlCodeArea.value = '';
            updatePreview();
            showStatus('代码已清空');
        }
    }

    function saveConfigToLocal() {
        localStorage.setItem('parser_config', JSON.stringify(currentConfig));
    }

    function loadConfigFromLocal() {
        const saved = localStorage.getItem('parser_config');
        if (saved) {
            try {
                const cfg = JSON.parse(saved);
                currentConfig = cfg;
                tokenInput.value = cfg.token || '';
                ownerInput.value = cfg.owner || 'A1ando';
                repoNameInput.value = cfg.repo || 'design';
                filePathInput.value = cfg.filePath || '';
                commitMsgTextarea.value = cfg.commitMessage || '';
            } catch(e) {}
        } else {
            ownerInput.value = 'A1ando';
            repoNameInput.value = 'design';
            filePathInput.value = '';
            commitMsgTextarea.value = '';
            currentConfig.owner = 'A1ando';
            currentConfig.repo = 'design';
            currentConfig.filePath = '';
            currentConfig.commitMessage = '';
        }
    }

    function saveSettingsOnly() {
        currentConfig.token = tokenInput.value.trim();
        currentConfig.owner = ownerInput.value.trim();
        currentConfig.repo = repoNameInput.value.trim();
        currentConfig.filePath = filePathInput.value.trim();
        currentConfig.commitMessage = commitMsgTextarea.value.trim();
        saveConfigToLocal();
    }

    function isConfigValid() {
        if (!currentConfig.token || !currentConfig.owner || !currentConfig.repo) {
            showStatus('请填写 Token、仓库所有者及仓库名称', true);
            return false;
        }
        if (!currentConfig.filePath) {
            showStatus('请填写文件路径', true);
            return false;
        }
        return true;
    }

    async function handleSaveAndUpload() {
        saveSettingsOnly();
        if (!isConfigValid()) return;
        
        let filePathToSave = normalizeFilePath(currentConfig.filePath);
        const htmlContent = htmlCodeArea.value;
        if (!htmlContent.trim()) {
            if (!confirm('代码为空，确定保存吗？')) return;
        }
        const commitMsg = currentConfig.commitMessage || '更新 HTML 内容';
        
        saveAndUploadBtn.disabled = true;
        const originalText = saveAndUploadBtn.innerText;
        saveAndUploadBtn.innerText = '⏳ 上传中...';
        try {
            const result = await saveToGitHub(
                currentConfig.owner,
                currentConfig.repo,
                filePathToSave,
                htmlContent,
                commitMsg,
                currentConfig.token
            );
            const commitUrl = result.commit.html_url || `https://github.com/${currentConfig.owner}/${currentConfig.repo}/commit/${result.commit.sha}`;
            showStatus(`保存成功！版本: "${commitMsg}" → <a href="${commitUrl}" target="_blank" style="color:#58a6ff;">查看提交</a>`, false);
            modal.style.display = 'none';
        } catch (err) {
            showStatus(`保存失败: ${err.message}`, true);
        } finally {
            saveAndUploadBtn.disabled = false;
            saveAndUploadBtn.innerText = originalText;
        }
    }

    async function handleLoad() {
        saveSettingsOnly();
        if (!isConfigValid()) return;
        
        let filePathToLoad = normalizeFilePath(currentConfig.filePath);
        loadFromGitBtn.disabled = true;
        const originalText = loadFromGitBtn.innerText;
        loadFromGitBtn.innerText = '⏳ 读取中...';
        try {
            const content = await loadFromGitHub(
                currentConfig.owner,
                currentConfig.repo,
                filePathToLoad,
                currentConfig.token
            );
            htmlCodeArea.value = content;
            updatePreview();
            showStatus(`成功加载 "${filePathToLoad}"`, false);
            modal.style.display = 'none';
        } catch (err) {
            showStatus(`加载失败: ${err.message}`, true);
        } finally {
            loadFromGitBtn.disabled = false;
            loadFromGitBtn.innerText = originalText;
        }
    }

    function openModal() {
        tokenInput.value = currentConfig.token;
        ownerInput.value = currentConfig.owner;
        repoNameInput.value = currentConfig.repo;
        filePathInput.value = currentConfig.filePath;
        commitMsgTextarea.value = currentConfig.commitMessage;
        modal.style.display = 'flex';
    }
    function closeModal() {
        modal.style.display = 'none';
    }

    function openInNewTab() {
        const iframeSrc = previewFrame.src;
        if (iframeSrc && iframeSrc !== 'about:blank') {
            window.open(iframeSrc, '_blank');
        } else {
            showStatus('没有可打开的预览页面，请先编辑代码', true);
        }
    }

    // 清空初始代码
    htmlCodeArea.value = '';
    updatePreview();

    let previewTimeout;
    htmlCodeArea.addEventListener('input', () => {
        clearTimeout(previewTimeout);
        previewTimeout = setTimeout(updatePreview, 30);
    });

    settingsBtn.addEventListener('click', openModal);
    cancelModalBtn.addEventListener('click', closeModal);
    loadFromGitBtn.addEventListener('click', handleLoad);
    saveAndUploadBtn.addEventListener('click', handleSaveAndUpload);
    clearBtn.addEventListener('click', clearEditor);
    openNewTabBtn.addEventListener('click', openInNewTab);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    // 初始化
    loadConfigFromLocal();
    initTheme();
    initResizer();
    if (currentConfig.token && currentConfig.owner && currentConfig.repo && currentConfig.filePath) {
        showStatus('配置已加载，可在设置中保存或加载文件');
    } else {
        showStatus('请点击「上传」完成 GitHub 配置');
    }
</script>
