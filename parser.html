<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HTML 沙盒 · 即时预览 + GitHub 版本控制</title>
    <style>
        * {
            box-sizing: border-box;
        }

        /* 主题变量（深色默认） */
        :root {
            --bg-body: #0d1117;
            --bg-header: #010409;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --bg-editor: #0d1117;
            --bg-sidebar: #161b22;
            --bg-modal: #161b22;
            --bg-input: #0d1117;
            --bg-card: rgba(25, 35, 55, 0.7);
            --shadow: rgba(0,0,0,0.3);
            --btn-primary: #238636;
            --btn-secondary: #1f6feb;
            --btn-danger: #6e2e2e;
            --preview-bg: white;
            --preview-text: black;
            --line-number-bg: #161b22;
            --line-number-text: #8b949e;
        }

        body.light {
            --bg-body: #f6f8fa;
            --bg-header: #ffffff;
            --border-color: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --bg-editor: #ffffff;
            --bg-sidebar: #f6f8fa;
            --bg-modal: #ffffff;
            --bg-input: #ffffff;
            --bg-card: rgba(255,255,255,0.9);
            --shadow: rgba(0,0,0,0.1);
            --btn-primary: #2c974b;
            --btn-secondary: #0969da;
            --btn-danger: #cf222e;
            --preview-bg: white;
            --preview-text: black;
            --line-number-bg: #f6f8fa;
            --line-number-text: #57606a;
        }

        body {
            margin: 0;
            background: var(--bg-body);
            font-family: 'Segoe UI', 'Roboto', 'Fira Code', monospace, system-ui;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* 顶部栏 */
        .header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
        }
        .title h1 {
            font-size: 1.35rem;
            margin: 0;
            font-weight: 600;
            background: linear-gradient(135deg, #79c0ff, #b392f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p {
            font-size: 0.7rem;
            margin: 0;
            color: var(--text-secondary);
        }
        .right-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-msg {
            font-family: monospace;
            font-size: 0.75rem;
            background: var(--bg-sidebar);
            padding: 0.2rem 0.8rem;
            border-radius: 16px;
            color: #7ee787;
        }
        body.light .status-msg {
            color: #1a7f37;
        }
        .icon-btn {
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .icon-btn:hover {
            background: var(--border-color);
        }
        .theme-btn {
            font-size: 1rem;
            padding: 0.3rem 0.6rem;
        }

        /* 主工作区 - 拖拽布局 */
        .main-panel {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* 编辑器容器（默认占比 40%） */
        .editor-container {
            width: 40%;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
            min-width: 200px;
            overflow: hidden;
            position: relative;
        }
        /* 预览容器（默认占比 60%） */
        .preview-container {
            width: 60%;
            display: flex;
            flex-direction: column;
            background: var(--preview-bg);
            overflow: hidden;
            position: relative;
        }
        /* 拖拽分隔条 */
        .resizer {
            width: 6px;
            background: var(--border-color);
            cursor: ew-resize;
            transition: background 0.1s;
            position: relative;
            z-index: 10;
        }
        .resizer:hover {
            background: #58a6ff;
        }

        .area-header {
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .clear-btn {
            background: var(--btn-danger);
            border: none;
            border-radius: 6px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
        }
        
        /* 带有行号的编辑器核心样式 */
        .code-container {
            flex: 1;
            padding: 12px;
            background: var(--bg-editor);
            display: flex;
            position: relative;
            overflow: hidden;
        }
        
        /* 拖拽文件进入时的遮罩提示层 */
        .drag-overlay {
            display: none;
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            background: rgba(31, 111, 235, 0.15);
            border: 2px dashed #1f6feb;
            border-radius: 12px;
            z-index: 5;
            justify-content: center;
            align-items: center;
            color: #58a6ff;
            font-weight: bold;
            font-size: 1.1rem;
            pointer-events: none;
        }
        .code-container.drag-over .drag-overlay {
            display: flex;
        }

        .editor-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-input);
        }

        /* 行号列 */
        .line-numbers {
            width: 40px;
            background: var(--line-number-bg);
            border-right: 1px solid var(--border-color);
            padding: 1rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            text-align: right;
            padding-right: 8px;
            color: var(--line-number-text);
            overflow: hidden;
            user-select: none;
        }

        textarea {
            flex: 1;
            height: 100%;
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            overflow-y: auto;
            white-space: pre;
        }

        .iframe-wrapper {
            flex: 1;
            background: var(--preview-bg);
            position: relative;
            margin: 8px 12px 12px 12px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--preview-bg);
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            user-select: none;
        }
        .open-new-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
        }
        .open-new-btn:hover {
            background: var(--border-color);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: var(--bg-modal);
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 35px var(--shadow);
        }
        .modal-card h3 {
            margin-bottom: 1.2rem;
        }
        .modal-card .field {
            margin-bottom: 1rem;
        }
        .modal-card label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--text-secondary);
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1.2rem;
        }
        .modal-actions button {
            padding: 0.4rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .modal-actions button.save {
            background: var(--btn-primary);
            color: white;
        }
        .modal-actions button.cancel {
            background: var(--bg-sidebar);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">
        <h1> HTML 沙盒 </h1>
        <p>粘贴或拖拽文件 | 实时渲染 | 保存到仓库</p>
    </div>
    <div class="right-area">
        <div class="status-msg" id="statusMsg">✅ 就绪</div>
        <button class="icon-btn theme-btn" id="themeToggleBtn">主题</button>
        <button class="icon-btn" id="settingsBtn">上传</button>
    </div>
</div>

<div class="main-panel" id="mainPanel">
    <div class="editor-container" id="editorContainer">
        <div class="area-header">
            <span>✏️ HTML 代码编辑器</span>
            <button class="clear-btn" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="code-container" id="dropZone">
            <div class="drag-overlay">📥 松开鼠标导入文件内容</div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea id="htmlCode" spellcheck="false" placeholder=""></textarea>
            </div>
        </div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="preview-container" id="previewContainer">
        <div class="preview-header">
            <span>🔍 实时预览</span>
            <button class="open-new-btn" id="openNewTabBtn">🔗 新标签打开</button>
        </div>
        <div class="iframe-wrapper">
            <iframe id="previewFrame" title="live preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-card">
        <h3>⚙️ GitHub 配置与操作</h3>
        <div class="field">
            <label>🔑 GitHub Token (repo 权限)</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxx 或 github_pat_xxxx">
        </div>
        <div class="field">
            <label>👤 仓库所有者</label>
            <input type="text" id="repoOwner" placeholder="用户名/组织" value="A1ando">
        </div>
        <div class="field">
            <label>📁 仓库名称</label>
            <input type="text" id="repoName" placeholder="repo-name" value="design">
        </div>
        <div class="field">
            <label>📂 文件路径</label>
            <input type="text" id="filePath">
        </div>
        <div class="field">
            <label>✍️ 提交描述</label>
            <textarea id="commitMessage" rows="2" placeholder="更新 HTML 内容"></textarea>
        </div>
        <div class="modal-actions">
            <button class="cancel" id="cancelModalBtn">取消</button>
            <button class="save" id="saveAndUploadBtn">保存并上传</button>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const htmlCodeArea = document.getElementById('htmlCode');
    const lineNumbersEle = document.getElementById('lineNumbers');
    const previewFrame = document.getElementById('previewFrame');
    const statusDiv = document.getElementById('statusMsg');
    const settingsBtn = document.getElementById('settingsBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modal = document.getElementById('settingsModal');
    const cancelModalBtn = document.getElementById('cancelModalBtn');
    const saveAndUploadBtn = document.getElementById('saveAndUploadBtn');
    const openNewTabBtn = document.getElementById('openNewTabBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const dropZone = document.getElementById('dropZone');
    
    const editorContainer = document.getElementById('editorContainer');
    const previewContainer = document.getElementById('previewContainer');
    const resizer = document.getElementById('resizer');
    
    // 弹窗内的输入框
    const tokenInput = document.getElementById('githubToken');
    const ownerInput = document.getElementById('repoOwner');
    const repoNameInput = document.getElementById('repoName');
    const filePathInput = document.getElementById('filePath');
    const commitMsgTextarea = document.getElementById('commitMessage');

    let currentConfig = { token: '', owner: 'A1ando', repo: 'design', filePath: '', commitMessage: '' };

    // ---------- 1. 默认屏占比与动态拖拽布局 ----------
    let startX, startEditorWidth, startPreviewWidth;
    
    function onMouseMove(e) {
        const containerRect = document.getElementById('mainPanel').getBoundingClientRect();
        const newEditorWidth = e.clientX - containerRect.left - (resizer.offsetWidth / 2);
        if (newEditorWidth > 150 && newEditorWidth < containerRect.width - 150) {
            editorContainer.style.width = newEditorWidth + 'px';
            previewContainer.style.width = (containerRect.width - newEditorWidth - resizer.offsetWidth) + 'px';
        }
    }
    
    function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        const mainRect = document.getElementById('mainPanel').getBoundingClientRect();
        localStorage.setItem('editor_ratio', editorContainer.offsetWidth / mainRect.width);
    }
    
    function initLayout() {
        const mainRect = document.getElementById('mainPanel').getBoundingClientRect();
        const savedRatio = localStorage.getItem('editor_ratio') || 0.4;
        const newEditorWidth = mainRect.width * parseFloat(savedRatio);
        
        editorContainer.style.width = newEditorWidth + 'px';
        previewContainer.style.width = (mainRect.width - newEditorWidth - resizer.offsetWidth) + 'px';

        resizer.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            document.body.style.cursor = 'ew-resize';
            document.body.style.userSelect = 'none';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            e.preventDefault();
        });
    }

    // ---------- 2. 编辑器行号生成及同步滚动 ----------
    function updateLineNumbers() {
        const lines = htmlCodeArea.value.split('\n');
        const lineCount = Math.max(1, lines.length);
        let arr = [];
        for (let i = 1; i <= lineCount; i++) {
            arr.push(i);
        }
        lineNumbersEle.innerHTML = arr.join('<br>');
    }

    htmlCodeArea.addEventListener('scroll', () => {
        lineNumbersEle.scrollTop = htmlCodeArea.scrollTop;
    });

    // ---------- 3. 文件拖拽读取系统 ----------
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
    });

    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
            const file = files[0];
            const fileExtension = file.name.split('.').pop().toLowerCase();
            const allowedExtensions = ['html', 'txt', 'json', 'md'];

            if (allowedExtensions.includes(fileExtension)) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    htmlCodeArea.value = event.target.result;
                    updateLineNumbers();
                    updatePreview();
                    showStatus(`📂 已成功导入本地文件: ${file.name}`);
                };
                reader.readAsText(file);
            } else {
                showStatus('❌ 仅支持拖拽扩展名为 .html, .txt, .json, .md 的文本文件', true);
            }
        }
    });

    // ---------- 4. 优化：取消确认直接清空 ----------
    function clearEditor() {
        htmlCodeArea.value = '';
        updateLineNumbers();
        updatePreview();
        showStatus('🧹 内容已清空');
    }

    // ---------- 5. 修正后的统一状态输出通知逻辑 ----------
    // 全局当前唯一的有效状态文本（不带HTML标签纯文本比较，防止BUG产生）
    let activeStatusText = ''; 

    function showStatus(msg, isError = false) {
        // 提取可能带有的HTML标签，留作清除比对时的参照
        const div = document.createElement('div');
        div.innerHTML = msg;
        activeStatusText = div.textContent || div.innerText;

        statusDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        statusDiv.style.color = isError ? '#f85149' : '#7ee787';

        // 4秒后如果当前没有更新的状态覆盖，则恢复到默认“就绪”
        setTimeout(() => {
            if (statusDiv.textContent.includes(activeStatusText)) {
                const isLight = document.body.classList.contains('light');
                statusDiv.style.color = isLight ? '#1a7f37' : '#7ee787';
                statusDiv.innerHTML = '✅ 就绪';
            }
        }, 4000);
    }

    function normalizeFilePath(path) {
        let trimmed = path.trim();
        if (!trimmed) return '';
        return trimmed.toLowerCase().endsWith('.html') ? trimmed : trimmed + '.html';
    }

    function utf8ToBase64(str) {
        return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
    }

    async function getExistingFileSha(owner, repo, path, token) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const response = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
        if (response.status === 200) return (await response.json()).sha;
        if (response.status === 404) return null;
        throw new Error(`获取文件异常 (${response.status})`);
    }

    async function saveToGitHub(owner, repo, path, content, commitMessage, token) {
        const sha = await getExistingFileSha(owner, repo, path, token);
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
        const payload = { message: commitMessage, content: utf8ToBase64(content) };
        if (sha) payload.sha = sha;
        
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`上传失败 ${response.status}: ${await response.text()}`);
        return await response.json();
    }

    function updatePreview() {
        const code = htmlCodeArea.value;
        try {
            const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        } catch (err) {
            previewFrame.srcdoc = code;
        }
    }

    function loadConfigFromLocal() {
        const saved = localStorage.getItem('parser_config');
        if (saved) {
            try {
                currentConfig = JSON.parse(saved);
                tokenInput.value = currentConfig.token || '';
                ownerInput.value = currentConfig.owner || 'A1ando';
                repoNameInput.value = currentConfig.repo || 'design';
                filePathInput.value = currentConfig.filePath || '';
                commitMsgTextarea.value = currentConfig.commitMessage || '';
            } catch(e){}
        }
    }

    async function handleSaveAndUpload() {
        currentConfig = { token: tokenInput.value.trim(), owner: ownerInput.value.trim(), repo: repoNameInput.value.trim(), filePath: filePathInput.value.trim(), commitMessage: commitMsgTextarea.value.trim() };
        localStorage.setItem('parser_config', JSON.stringify(currentConfig));
        
        if (!currentConfig.token || !currentConfig.filePath) { showStatus('密码/Token 及文件路径不能为空', true); return; }
        
        let path = normalizeFilePath(currentConfig.filePath);
        saveAndUploadBtn.disabled = true;
        saveAndUploadBtn.innerText = '⏳ 上传中...';
        
        // 同步修改右上角的全局状态为 “正在上传”
        showStatus(`正在上传文件至仓库 ${currentConfig.owner}/${currentConfig.repo}...`);

        try {
            const result = await saveToGitHub(currentConfig.owner, currentConfig.repo, path, htmlCodeArea.value, currentConfig.commitMessage || '更新 HTML 内容', currentConfig.token);
            // 成功：将带有提交链接的高亮通知立刻打到右上角 “就绪” 状态栏上，并在 4 秒后自动恢复为 “✅ 就绪”
            showStatus(`上传成功！<a href="${result.commit.html_url}" target="_blank" style="color:#58a6ff;text-decoration:underline;">查看提交</a>`);
            modal.style.display = 'none';
        } catch (err) {
            showStatus(err.message, true);
        } finally {
            saveAndUploadBtn.disabled = false; 
            saveAndUploadBtn.innerText = '保存并上传';
        }
    }

    function openInNewTab() {
        const code = htmlCodeArea.value;
        if (code.trim()) {
            const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
            window.open(URL.createObjectURL(blob), '_blank');
        } else {
            showStatus('没有可导出的内容', true);
        }
    }

    // ---------- 事件监听及初始化 ----------
    let previewTimeout;
    htmlCodeArea.addEventListener('input', () => {
        updateLineNumbers();
        clearTimeout(previewTimeout);
        previewTimeout = setTimeout(updatePreview, 30);
    });

    settingsBtn.addEventListener('click', () => modal.style.display = 'flex');
    cancelModalBtn.addEventListener('click', () => modal.style.display = 'none');
    saveAndUploadBtn.addEventListener('click', handleSaveAndUpload);
    clearBtn.addEventListener('click', clearEditor);
    openNewTabBtn.addEventListener('click', openInNewTab);
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    // 执行加载
    htmlCodeArea.value = '';
    updateLineNumbers();
    updatePreview();
    loadConfigFromLocal();
    initTheme();
    initLayout();
</script>
</body>
</html>
