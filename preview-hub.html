<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计画廊 · 自动预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部区域，包含标题和新标签按钮 */
        .bar {
            background: #010409;
            border-bottom: 1px solid #30363d;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c9d1d9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .open-new-btn {
            background: #1f6feb;
            border: none;
            border-radius: 6px;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: background 0.1s;
        }

        .open-new-btn:hover {
            background: #388bfd;
        }

        .open-new-btn:disabled {
            background: #30363d;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: #21262d;
        }

        /* 左侧文件列表 */
        .sidebar {
            width: 280px;
            background: #161b22;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0.75rem 1rem;
            font-weight: 500;
            border-bottom: 1px solid #30363d;
            background: #0d1117;
            font-size: 0.85rem;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .file-item {
            padding: 0.5rem 0.7rem;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            transition: background 0.1s;
        }

        .file-item:hover {
            background: #21262d;
        }

        .file-item.active {
            background: #1f6feb;
            color: white;
        }

        /* 右侧预览区 */
        .preview {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            background: #161b22;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }

        .iframe-wrapper {
            flex: 1;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .status {
            background: #010409;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            font-family: monospace;
            color: #7ee787;
            border-top: 1px solid #30363d;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #8b949e;
            font-size: 0.85rem;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #161b22;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="bar">
    <span>📂 设计仓库 </span>
    <button class="open-new-btn" id="openNewTabBtn" disabled>🔗 新标签打开</button>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-header">📄 设计稿Hub </div>
        <div class="file-list" id="fileList">
            <div class="empty-message">⏳ 加载中，请稍候...</div>
        </div>
    </div>
    <div class="preview">
        <div class="preview-header" id="previewLabel">未选择文件</div>
        <div class="iframe-wrapper">
            <iframe id="previewFrame" title="preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>
<div class="status" id="statusMsg">✅ 正在连接 GitHub API...</div>

<script>
    // 硬编码仓库信息
    const OWNER = 'A1ando';
    const REPO = 'design';
    // 需要排除的文件名（完全匹配）
    const EXCLUDED = ['parser.html', 'preview-hub.html'];

    const fileListDiv = document.getElementById('fileList');
    const previewFrame = document.getElementById('previewFrame');
    const previewLabel = document.getElementById('previewLabel');
    const statusDiv = document.getElementById('statusMsg');
    const openNewTabBtn = document.getElementById('openNewTabBtn');

    let currentPreviewUrl = null; // 记录当前预览的URL

    // 递归获取所有 .html 文件，排除指定文件
    async function getAllHtmlFiles(path = '') {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path)}`;
        const response = await fetch(url, {
            headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) {
            const err = await response.text();
            throw new Error(`API 请求失败 (${response.status}): ${err.slice(0, 100)}`);
        }
        const items = await response.json();
        let results = [];
        for (const item of items) {
            if (item.type === 'file' && item.name.endsWith('.html')) {
                if (EXCLUDED.includes(item.name)) continue;
                const pagesUrl = `https://${OWNER}.github.io/${REPO}/${item.path}`;
                results.push({
                    path: item.path,
                    name: item.name,
                    url: pagesUrl
                });
            } else if (item.type === 'dir') {
                const subFiles = await getAllHtmlFiles(item.path);
                results.push(...subFiles);
            }
        }
        return results;
    }

    // 渲染文件列表
    function renderList(files) {
        fileListDiv.innerHTML = '';
        if (files.length === 0) {
            fileListDiv.innerHTML = '<div class="empty-message">📭 没有找到任何 HTML 文件<br>(已排除 parser.html 和 preview-hub.html)</div>';
            return;
        }
        files.forEach((file, idx) => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.textContent = file.path;
            div.setAttribute('data-url', file.url);
            div.setAttribute('data-path', file.path);
            div.addEventListener('click', () => {
                // 高亮当前
                document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                // 预览
                previewFrame.src = file.url;
                currentPreviewUrl = file.url;
                previewLabel.textContent = `当前预览：${file.path}`;
                statusDiv.innerHTML = `✅ 正在预览：${file.path}`;
                // 启用新标签按钮
                openNewTabBtn.disabled = false;
                // 记住最后一次选择的文件
                localStorage.setItem('last_selected_design', file.path);
            });
            fileListDiv.appendChild(div);
        });
        // 恢复上次预览的文件
        const lastPath = localStorage.getItem('last_selected_design');
        let target = null;
        if (lastPath) {
            target = Array.from(fileListDiv.children).find(
                child => child.getAttribute('data-path') === lastPath
            );
        }
        if (target) {
            target.click();
        } else if (files.length > 0) {
            fileListDiv.firstChild.click();
        } else {
            // 没有文件时禁用按钮
            openNewTabBtn.disabled = true;
        }
    }

    // 新标签页打开
    function openInNewTab() {
        if (currentPreviewUrl) {
            window.open(currentPreviewUrl, '_blank');
            statusDiv.innerHTML = `✅ 已在新标签页打开：${currentPreviewUrl}`;
        } else {
            statusDiv.innerHTML = `⚠️ 没有正在预览的文件，请先选择一个设计稿`;
        }
    }

    // 启动扫描
    async function startScan() {
        statusDiv.innerHTML = '⏳ 正在扫描仓库 A1ando/design（包含子目录）...';
        fileListDiv.innerHTML = '<div class="empty-message">⏳ 递归扫描中，请稍候...</div>';
        try {
            const files = await getAllHtmlFiles();
            renderList(files);
            statusDiv.innerHTML = `✅ 扫描完成，共找到 ${files.length} 个设计稿 (已排除 parser.html / preview-hub.html)`;
        } catch (err) {
            console.error(err);
            fileListDiv.innerHTML = `<div class="empty-message">❌ 加载失败: ${err.message}<br>请确保仓库为公开，或稍后重试</div>`;
            statusDiv.innerHTML = `❌ 错误: ${err.message}`;
            openNewTabBtn.disabled = true;
        }
    }

    // 绑定新标签按钮事件
    openNewTabBtn.addEventListener('click', openInNewTab);

    startScan();
</script>
</body>
</html>
